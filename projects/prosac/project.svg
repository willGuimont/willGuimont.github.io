<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">PROSAC</title><desc id="desc">Ranked data points and outliers around a robust fitted line.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#07151b"/><stop offset="1" stop-color="#17262d"/></linearGradient><pattern id="grid" width="65" height="65" patternUnits="userSpaceOnUse"><path d="M65 0H0V65" fill="none" stroke="#9bb0b8" stroke-opacity=".09"/></pattern></defs>
  <rect width="1440" height="810" fill="url(#bg)"/><rect x="620" y="80" width="720" height="650" rx="30" fill="url(#grid)" stroke="#334a53" stroke-width="3"/>
  <text x="85" y="125" fill="#66ccff" font-family="ui-monospace,monospace" font-size="27" font-weight="700" letter-spacing="6">ROBUST ESTIMATION</text>
  <text x="85" y="225" fill="#f5f7f8" font-family="Georgia,serif" font-size="92">PROSAC</text>
  <text x="90" y="295" fill="#9fb1b8" font-family="ui-monospace,monospace" font-size="25">PROGRESSIVE SAMPLE</text><text x="90" y="334" fill="#9fb1b8" font-family="ui-monospace,monospace" font-size="25">CONSENSUS</text>
  <g transform="translate(90 410)" font-family="ui-monospace,monospace"><text y="0" fill="#66ccff" font-size="22">HIGH QUALITY</text><path d="M0 36h430" stroke="#344b55" stroke-width="12" stroke-linecap="round"/><path d="M0 36h270" stroke="#66ccff" stroke-width="12" stroke-linecap="round"/><circle cx="35" cy="36" r="15" fill="#f5f7f8"/><circle cx="95" cy="36" r="15" fill="#f5f7f8"/><circle cx="155" cy="36" r="15" fill="#dbe5e9"/><circle cx="215" cy="36" r="15" fill="#a8bbc2"/><circle cx="275" cy="36" r="15" fill="#718992"/><text y="105" fill="#718992" font-size="22">LOW QUALITY</text></g>
  <g stroke="#344b55" stroke-width="2"><path d="M675 650V135M675 650h610"/></g>
  <path d="M690 610 1260 205" fill="none" stroke="#66ccff" stroke-width="9" stroke-linecap="round"/>
  <g fill="#48d7b0" stroke="#07151b" stroke-width="5"><circle cx="735" cy="565" r="16"/><circle cx="798" cy="530" r="16"/><circle cx="870" cy="462" r="16"/><circle cx="948" cy="423" r="16"/><circle cx="1012" cy="362" r="16"/><circle cx="1090" cy="320" r="16"/><circle cx="1170" cy="252" r="16"/></g>
  <g fill="#f07983" stroke="#07151b" stroke-width="5"><circle cx="760" cy="230" r="15"/><circle cx="910" cy="610" r="15"/><circle cx="1110" cy="530" r="15"/><circle cx="1240" cy="410" r="15"/></g>
  <text x="1185" y="700" fill="#9fb1b8" font-family="ui-monospace,monospace" font-size="21">OUTLIERS IGNORED</text>
</svg>
